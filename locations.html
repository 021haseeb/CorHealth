<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Locations | COR Healthcare</title>

<link rel="stylesheet" href="locations.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <img src="logohealth.png" alt="">
  </div>

  <button class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
    <span class="menu-icon" aria-hidden="true"></span>
  </button>

  <ul id="nav-links" class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="locations.html" class="active">Locations</a></li>
    <li><a href="contact.html">Contact</a></li>
    
  </ul>

  <a href="contact.html">
    <button class="nav-btn">Contact Us</button>
  </a>
</nav>

<!-- HERO -->
<section class="locations-hero">
  <div class="hero-content reveal">
    <span class="tag">Find Care Near You</span>
    <h1>15+ Healthcare Locations<br>Across Maryland</h1>
    <p>Search our trusted facilities and find the perfect care solution for your loved ones</p>
  </div>
</section>

<!-- SEARCH BAR -->
<section class="search-section reveal">
  <div class="search-box">
    <svg width="20" height="20" fill="none" stroke="#facc15" stroke-width="2">
      <circle cx="9" cy="9" r="7"></circle>
      <path d="m14 14 4 4"></path>
    </svg>
    <input type="text" id="searchInput" placeholder="Search by city, address, or facility name...">
  </div>
  
  <div class="filter-tags">
    <button class="filter-btn active" data-filter="all">All Locations</button>
    <button class="filter-btn" data-filter="assisted">Assisted Living</button>
    <button class="filter-btn" data-filter="nursing">Nursing Care</button>
    <button class="filter-btn" data-filter="memory">Memory Care</button>
  </div>
</section>

<!-- MAP + LIST GRID -->
<section class="locations-grid">
  <!-- LEFT: MAP -->
  <div class="map-wrapper reveal">
    <div id="map"></div>
  </div>

  <!-- RIGHT: FACILITIES LIST -->
  <div class="facilities-list reveal" id="facilitiesList">
    <!-- JS se cards yahan aayein ge -->
  </div>
</section>

<!-- CTA -->
<section class="cta-section reveal">
  <div class="cta-box">
    <h2>Can't Find Nearby?</h2>
    <p>Call our care coordinators and we'll find the perfect location for you</p>
    <button class="nav-btn" onclick="window.location.href='contact.html'">Talk To An Expert</button>
  </div>
</section>

<!-- POPUP MODAL -->
<div class="modal" id="locationModal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">&times;</button>
    <div class="modal-body" id="modalBody">
      <!-- JS se content aayega -->
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="locations.js"></script>
</body>
</html>

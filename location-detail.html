<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Details | COR Healthcare</title>

<link rel="stylesheet" href="locations.css" />
  <link rel="stylesheet" href="locations-extra.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="logonew.png" alt="" />
    </div>

    <button class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span class="menu-icon" aria-hidden="true"></span>
    </button>

    <ul id="nav-links" class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="locations.html">Locations</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <a href="contact.html"><button class="nav-btn">Contact Us</button></a>
  </nav>

  <section class="detail-hero">
    <div class="detail-inner">
      <div class="detail-header reveal">
        <span class="tag" id="detailTag">Location</span>
        <h1 id="detailTitle">—</h1>
        <p id="detailSubtitle">—</p>
      </div>

      <div class="detail-layout">
        <div class="detail-media reveal">
          <img id="detailImage" src="" alt="" />
        </div>

        <div class="detail-content reveal">
          <h2>What you can expect</h2>
          <ul id="detailList"></ul>

          <div class="detail-actions">
            <a id="detailMapLink" href="#" target="_blank" rel="noopener">
              <button class="nav-btn">View On Map</button>
            </a>
            <a href="contact.html">
              <button class="secondary-btn" style="margin-left:14px;">Schedule a Tour</button>
            </a>
          </div>

          <div class="detail-map-wrap">
            <h3 class="detail-map-title">Location on Map</h3>
            <div class="detail-map-shell">
              <iframe
                id="detailMapFrame"
                title="Google Map"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                src="https://www.google.com/maps?q=2833%20Smith%20Ave%2C%20Baltimore%2C%20MD&output=embed">
              </iframe>
            </div>
          </div>
        </div>
      </div>


      <div class="detail-back reveal">
        <a href="locations.html" class="back-link">← Back to all homes</a>
      </div>
    </div>
  </section>

  <script src="locations.js"></script>
  <script>
    // Small inline bootstrap in case locations.js focuses on navbar/animations only
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const home = params.get('home');
      if (window.__renderLocationDetail) {
        window.__renderLocationDetail(home);
      }
    });
  </script>
</body>
</html>
